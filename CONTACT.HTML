<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Sharma Tech Innovations | Portfolio & Services</title>
    <meta
      name="description"
      content="Showcasing work, skills, and achievements of Sharma Tech Innovations in web development, problem solving, and creative design."
    />
    <link rel="icon" type="image/png" href="images/Brand_logo.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NavBar -->
    <div id="navbar-placeholder"></div>

    <section class="contact-section">
      <div class="container">
        <h1>Get In Touch</h1>
        <div class="contact-content">
          <div class="contact-info">
            <h2>Contact Information</h2>
            <p>
              Feel free to reach out for collaborations, questions, or
              just to say hello!
            </p>

            <div class="info-item">
              <h3>Email</h3>
              <p>Neerajsharma12@gmail.com</p>
            </div>

            <div class="info-item">
              <h3>Phone</h3>
              <p>+918299656977</p>
            </div>

            <div class="info-item">
              <h3>Location</h3>
              <p>Paniyara Maharajganj, Uttar Pradesh</p>
            </div>
          </div>

          <form class="contact-form" id="contactForm">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input
                type="text"
                id="subject"
                name="subject"
                required
              />
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
              ></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
          </form>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 Sharma Tech Innovations. All rights reserved.</p>
    </footer>

    <script src="scripts/main.js"></script>
  </body>
</html>
